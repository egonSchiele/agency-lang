# Runs the agency and agency-js test suites against the real OpenAI
# provider. Triggered only on pushes to `main` (i.e. after a PR is
# merged), NOT on pull requests — this prevents PR authors from forking
# the repo, opening a PR that prints/exfiltrates secrets, and grabbing
# the OPENAI_API_KEY. The PR-triggered workflow (`test.yml`) covers the
# same suites under the deterministic LLM provider, so PR authors still
# get coverage without needing the secret.
#
# Security: all actions pinned to SHA. Do not use pull_request_target.
name: Real-LLM tests (post-merge)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # The agency + agency-js suites are sharded (same round-robin split as the
  # deterministic PR workflow) so the post-merge real-LLM run finishes faster.
  # Each shard runs its own slice against the real provider. Note this raises
  # peak concurrency against the OpenAI API (SHARD_COUNT × -p), so if these
  # start hitting rate limits, lower `-p` or SHARD_COUNT.
  real-llm-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      SHARD_COUNT: "4"

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up pnpm
      uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 9
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22.x
        cache: 'pnpm'

    - run: pnpm install
    - run: make

    - name: Agency execution tests (real LLM, shard ${{ matrix.shard }}/${{ env.SHARD_COUNT }})
      working-directory: packages/agency-lang
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: node ./dist/scripts/agency.js test tests/agency -p 12 --shard ${{ matrix.shard }}/${{ env.SHARD_COUNT }}

    - name: Agency-JS integration tests (real LLM, shard ${{ matrix.shard }}/${{ env.SHARD_COUNT }})
      working-directory: packages/agency-lang
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: node ./dist/scripts/agency.js test js tests/agency-js -p 12 --shard ${{ matrix.shard }}/${{ env.SHARD_COUNT }}

  # The agent + efficacy suites are not the file-per-test agency suite and are
  # not shardable by `--shard`; they run once in their own job.
  real-llm-extras:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up pnpm
      uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 9
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22.x
        cache: 'pnpm'

    - run: pnpm install
    - run: make

    - name: Built-in agent tests (real LLM)
      working-directory: packages/agency-lang
      # No AGENCY_USE_TEST_LLM_PROVIDER here: the same agent tests that run
      # deterministically on PRs (test.yml) hit a real provider on merge to
      # main, which is the stronger check — it validates that the real API
      # accepts each agent's tool schemas (unique names, valid shapes).
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: pnpm run test:agents

    - name: Optimizer efficacy tests (real LLM)
      working-directory: packages/agency-lang
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: pnpm run test:optimize-efficacy

    - name: std::agents efficacy tests (real LLM)
      # Non-blocking: this tracks worker-agent quality over time; a flaky
      # real-LLM miss should not fail the post-merge build.
      continue-on-error: true
      working-directory: packages/agency-lang
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: pnpm run test:agents-efficacy
