# Security: all actions pinned to SHA. Do not use pull_request_target.
name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 23.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up pnpm
      uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 9
        run_install: false

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - run: pnpm install
    - run: make
    - name: Build docs
      if: matrix.node-version == '22.x'
      run: pnpm run docs
    - run: pnpm test:run
    - name: Integration tests (tarball install, bundlers, CLI)
      if: matrix.node-version == '22.x'
      env:
        TMPDIR: ${{ runner.temp }}
      run: |
        cd packages/agency-lang
        npm pack
        node tests/integration/smoke/test.mjs ./agency-lang-*.tgz
        node tests/integration/bundlers/test-esbuild.mjs ./agency-lang-*.tgz
        node tests/integration/bundlers/test-vite.mjs ./agency-lang-*.tgz
        node tests/integration/cli/test.mjs ./agency-lang-*.tgz
        rm -f agency-lang-*.tgz
    - name: Stdlib sandbox tests
      if: matrix.node-version == '22.x'
      working-directory: packages/agency-lang
      env:
        CI: "true"
      run: node tests/integration/stdlib-sandbox/run.mjs
      timeout-minutes: 10
    - name: Agency execution tests
      working-directory: packages/agency-lang
      env:
        AGENCY_USE_TEST_LLM_PROVIDER: "1"
      run: pnpm run test:agency
    - name: Agency-JS integration tests
      working-directory: packages/agency-lang
      env:
        AGENCY_USE_TEST_LLM_PROVIDER: "1"
      run: pnpm run test:agency-js
    - name: github stdlib smoke test
      if: matrix.node-version == '22.x' && env.GITHUB_TEST_TOKEN != ''
      env:
        GITHUB_TEST_TOKEN: ${{ secrets.GITHUB_TEST_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TEST_TOKEN }}
      run: pnpm -F @agency-lang/github test:agency
