# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 23.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9 # Specify a pnpm version or use "latest"
        run_install: false # Do not run install yet, handled in next step

    # - name: Install libnotify-bin
    #   run: |
    #     sudo apt-get update
    #     sudo apt-get install -y libnotify-bin

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm' # Enables pnpm-specific caching
    - run: pnpm install
    - run: make
    - run: pnpm test:run
    - name: Smoke test (tarball install)
      if: matrix.node-version == '22.x'
      env:
        TMPDIR: ${{ runner.temp }}
      run: |
        cd packages/agency-lang
        npm pack
        node tests/integration/smoke/test.mjs ./agency-lang-*.tgz
        rm -f agency-lang-*.tgz
