# Generated by `agency schedule add`. Edit freely.
# Action SHAs are pinned. Re-run `agency schedule add --force` after upgrading agency-lang to refresh.
name: nightly
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: agency-${{ github.workflow }}
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: egonSchiele/run-agency-action@v1.0.2
        with:
          file: 'agents/nightly.agency'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_TOKEN: ${{ secrets.EXTRA_TOKEN }}
