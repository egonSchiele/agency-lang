# Generated by `agency schedule add`. Edit freely.
# Action versions are not SHA-pinned because --no-pin was used. Remove --no-pin to pin action SHAs.
name: snap
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: agency-${{ github.workflow }}
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: egonSchiele/run-agency-action@v1.0.2
        with:
          file: 'agents/foo.agency'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
